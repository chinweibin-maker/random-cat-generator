<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>玄学全能大师 Pro</title>
    <style>
        :root {
            --gold: #f1c40f; --purple: #6c5ce7; --bg: #0f0e17;
            --card: #1b1a23; --text: #a7a9be; --bright: #fffffe; --accent: #e67e22;
        }
        body { font-family: 'PingFang SC', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .master-container { width: 100%; max-width: 420px; background: var(--card); padding: 25px; border-radius: 30px; border: 1px solid #2d2b38; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; }
        
        h1 { color: var(--bright); font-size: 1.6rem; margin-bottom: 5px; }
        .tagline { color: var(--purple); font-size: 0.75rem; font-weight: bold; margin-bottom: 20px; }

        .input-group { text-align: left; margin-bottom: 12px; }
        label { font-size: 0.7rem; color: var(--purple); font-weight: bold; margin-bottom: 5px; display: block; }
        input, select { width: 100%; padding: 12px; background: #0f0e17; border: 1px solid #333; border-radius: 12px; color: var(--bright); font-size: 1rem; box-sizing: border-box; outline: none; }

        .btn-calc { width: 100%; padding: 18px; background: linear-gradient(135deg, var(--purple), var(--accent)); color: white; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        #resultView { margin-top: 25px; display: none; }
        .res-card { background: #24222e; padding: 18px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #363346; text-align: left; }
        .res-header { font-size: 0.8rem; color: var(--gold); font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }

        /* 八字网格 */
        .bazi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
        .pillar { background: #0f0e17; padding: 10px 5px; border-radius: 10px; text-align: center; border: 1px solid #444; }
        .p-char { font-size: 1.3rem; font-weight: bold; color: var(--gold); white-space: pre-line; }

        /* 运势条 */
        .stat-row { display: flex; align-items: center; margin: 8px 0; font-size: 0.8rem; }
        .stat-bar { flex: 1; height: 6px; background: #111; border-radius: 3px; margin-left: 10px; overflow: hidden; }
        .stat-fill { height: 100%; background: var(--gold); width: 0; transition: width 1s; }

        /* 猫咪图 */
        .cat-box { position: relative; width: 100%; border-radius: 15px; overflow: hidden; margin-top: 10px; }
        #catImg { width: 100%; display: block; border-radius: 15px; }

        .btn-action { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-copy { background: #444; color: white; }
        .btn-share { background: #4285F4; color: white; }
        .btn-meow { background: #333; color: #00ffcc; border: 1px solid #00ffcc; }
        
        .highlight { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div class="master-container">
    <h1>🔮 玄学全能大师</h1>
    <p class="tagline">Personal Astro & Bazi & Tarot</p>

    <div class="input-group">
        <label>出生日期</label>
        <input type="date" id="dateIn">
    </div>
    <div class="input-group">
        <label>出生时辰</label>
        <select id="hourIn">
            <option value="0">子时 (23:00-01:00)</option>
            <option value="1">丑时 (01:00-03:00)</option>
            <option value="3">寅时 (03:00-05:00)</option>
            <option value="5">卯时 (05:00-07:00)</option>
            <option value="7">辰时 (07:00-09:00)</option>
            <option value="9">巳时 (09:00-11:00)</option>
            <option value="11">午时 (11:00-13:00)</option>
            <option value="13">未时 (13:00-15:00)</option>
            <option value="15">申时 (15:00-17:00)</option>
            <option value="17">酉时 (17:00-19:00)</option>
            <option value="19">戌时 (19:00-21:00)</option>
            <option value="21">亥时 (21:00-23:00)</option>
        </select>
    </div>

    <button class="btn-calc" onclick="doEverything()">一键推算命运</button>

    <div id="resultView">
        <div class="res-card">
            <div class="res-header">✨ 核心命盘</div>
            <p>生肖：<span id="zodiacRes" class="highlight"></span> | 星座：<span id="horoRes" class="highlight"></span></p>
            <div class="bazi-grid">
                <div class="pillar"><div class="p-char" id="bz4"></div><div style="font-size:0.6rem">时</div></div>
                <div class="pillar"><div class="p-char" id="bz3"></div><div style="font-size:0.6rem">日</div></div>
                <div class="pillar"><div class="p-char" id="bz2"></div><div style="font-size:0.6rem">月</div></div>
                <div class="pillar"><div class="p-char" id="bz1"></div><div style="font-size:0.6rem">年</div></div>
            </div>
        </div>

        <div class="res-card">
            <div class="res-header">🃏 灵魂塔罗</div>
            <p id="tarotTitle" class="highlight" style="font-size:1.1rem; margin:5px 0;"></p>
            <p id="tarotDesc" style="font-size:0.85rem; color:#ccc;"></p>
        </div>

        <div class="res-card">
            <div class="res-header">📅 今日运势</div>
            <div class="stat-row">事业 <div class="stat-bar"><div id="b1" class="stat-fill"></div></div></div>
            <div class="stat-row">财运 <div class="stat-bar"><div id="b2" class="stat-fill"></div></div></div>
            <div class="stat-row">缘分 <div class="stat-bar"><div id="b3" class="stat-fill"></div></div></div>
        </div>

        <div class="res-card">
            <div class="res-header">☯️ 风水建议</div>
            <p style="font-size:0.85rem">今日财位：<span id="f1" class="highlight"></span></p>
            <p style="font-size:0.85rem">幸运颜色：<span id="f2" class="highlight"></span></p>
        </div>

        <div class="res-card" style="text-align:center;">
            <div class="res-header">🐱 守护喵星人</div>
            <div class="cat-box"><img id="catImg" src=""></div>
            <button class="btn-meow" onclick="playMeow()">🔊 听它喵一声</button>
        </div>

        <button class="btn-action btn-copy" onclick="copyResults()">📋 复制测算结果</button>
        <button class="btn-action btn-share" onclick="sharePage()">🔗 分享给好友</button>
    </div>
</div>

<script>
    const tarotList = [
        {n:"愚者", d:"新的开始，勇敢去尝试！"}, {n:"魔术师", d:"你拥有无限潜能。"}, 
        { name: "女祭司", d: "相信你的直觉。" }, { name: "恋人", d: "人际关系和谐美满。" }
    ];

    // 解决“喝水声”：使用不同来源的真实猫叫
    const MEOWS = [
        "https://cdn.freesound.org/previews/256/256334_4486188-lq.mp3",
        "https://cdn.freesound.org/previews/459/459992_9154694-lq.mp3"
    ];

    function doEverything() {
        const dStr = document.getElementById('dateIn').value;
        const hour = parseInt(document.getElementById('hourIn').value);
        if(!dStr) return alert("请选日期");

        const date = new Date(dStr);
        const y = date.getFullYear(), m = date.getMonth()+1, d = date.getDate();

        // 生肖与星座
        const zs = ["猴","鸡","狗","猪","鼠","牛","虎","兔","龙","蛇","马","羊"];
        document.getElementById('zodiacRes').innerText = zs[y % 12];
        
        let hr = "双鱼座";
        if ((m == 3 && d >= 21) || (m == 4 && d <= 19)) hr = "白羊座";
        else if ((m == 4 && d >= 20) || (m == 5 && d <= 20)) hr = "金牛座";
        else if ((m == 5 && d >= 21) || (m == 6 && d <= 21)) hr = "双子座";
        else if ((m == 6 && d >= 22) || (m == 7 && d <= 22)) hr = "巨蟹座";
        else if ((m == 7 && d >= 23) || (m == 8 && d <= 22)) hr = "狮子座";
        else if ((m == 8 && d >= 23) || (m == 9 && d <= 22)) hr = "处女座";
        else if ((m == 9 && d >= 23) || (m == 10 && d <= 23)) hr = "天秤座";
        else if ((m == 10 && d >= 24) || (m == 11 && d <= 22)) hr = "天蝎座";
        else if ((m == 11 && d >= 23) || (m == 12 && d <= 21)) hr = "射手座";
        else if ((m == 12 && d >= 22) || (m == 1 && d <= 19)) hr = "摩羯座";
        else if ((m == 1 && d >= 20) || (m == 2 && d <= 18)) hr = "水瓶座";
        document.getElementById('horoRes').innerText = hr;

        // 八字
        const G = "甲乙丙丁戊己庚辛壬癸", Z = "子丑寅卯辰巳午未申酉戌亥";
        let nG = G[(y-4)%10], nZ = Z[(y-4)%12];
        let mG = G[((y%5)*2 + m + 1)%10], mZ = Z[(m+1)%12];
        let diff = Math.floor((date - new Date(1900,0,31))/86400000);
        let rG = G[diff%10], rZ = Z[(diff+4)%12];
        let sG = G[((diff%5)*2 + Math.floor((hour+1)/2))%10], sZ = Z[Math.floor((hour+1)/2)%12];

        document.getElementById('bz1').innerText = nG + "\n" + nZ;
        document.getElementById('bz2').innerText = mG + "\n" + mZ;
        document.getElementById('bz3').innerText = rG + "\n" + rZ;
        document.getElementById('bz4').innerText = sG + "\n" + sZ;

        // 塔罗
        const t = tarotList[(y+m+d)%tarotList.length];
        document.getElementById('tarotTitle').innerText = t.n;
        document.getElementById('tarotDesc').innerText = t.d;

        // 运势动画
        document.getElementById('resultView').style.display = 'block';
        setTimeout(()=> {
            document.getElementById('b1').style.width = (60+y%30)+"%";
            document.getElementById('b2').style.width = (50+m*3)+"%";
            document.getElementById('b3').style.width = (70+d%25)+"%";
        }, 100);

        // 风水
        document.getElementById('f1').innerText = ["正东","正西","正南","正北"][d%4];
        document.getElementById('f2').innerText = ["金","木","水","火","土"][m%5] + "色系";

        // 猫咪图
        fetch('https://api.thecatapi.com/v1/images/search').then(r=>r.json()).then(data=>{
            document.getElementById('catImg').src = data[0].url;
        });
    }

    function playMeow() {
        const sound = MEOWS[Math.floor(Math.random()*MEOWS.length)];
        new Audio(sound).play();
    }

    function copyResults() {
        const z = document.getElementById('zodiacRes').innerText;
        const h = document.getElementById('horoRes').innerText;
        const t = document.getElementById('tarotTitle').innerText;
        const text = `我的测算结果：生肖${z}，星座${h}，灵魂塔罗是${t}。你也来试试看！`;
        navigator.clipboard.writeText(text);
        alert("结果已复制到剪贴板！");
    }

    function sharePage() {
        if(navigator.share) {
            navigator.share({ title: '玄学全能大师', url: window.location.href });
        } else {
            alert("请复制浏览器地址分享给好友！");
        }
    }
</script>
</body>
</html>
