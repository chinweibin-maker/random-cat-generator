<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机猫咪生成器 🐱</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; background-color: #fdf6e3; padding-top: 50px; color: #333; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: inline-block; max-width: 500px; width: 90%; }
        button { font-size: 18px; font-weight: bold; padding: 12px 25px; cursor: pointer; background-color: #ff9f43; border: none; border-radius: 8px; color: white; transition: 0.3s; box-shadow: 0 4px 6px rgba(255, 159, 67, 0.3); }
        button:hover { background-color: #ee5253; transform: translateY(-2px); }
        img { max-width: 100%; max-height: 400px; border-radius: 10px; margin-top: 20px; display: none; object-fit: cover; }
        #loading { font-size: 16px; color: #888; margin-top: 20px; display: none; font-style: italic; }
        .tech-note { margin-top: 30px; font-size: 12px; color: #aaa; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🐱 随机喵星人召唤器</h1>
        <p>点击按钮，通过 API 从云端召唤一只猫咪</p>
        
        <button onclick="fetchCat()">立刻召唤！</button>
        
        <div id="loading">正在连接猫咪星球，请稍候... 🚀</div>
        <img id="catImage" src="" alt="一只可爱的猫咪">
        
        <div class="tech-note">Powered by The Cat API & JavaScript Fetch</div>
    </div>

    <script>
        // 这是你的核心商业逻辑：如何通过 API 抓取数据
        function fetchCat() {
            // 1. 按下按钮时，显示加载文字，隐藏旧照片
            document.getElementById('loading').style.display = 'block';
            document.getElementById('catImage').style.display = 'none';

            // 2. 发送请求给服务器 (这就是 API 串接的核心代码！)
            fetch('https://api.thecatapi.com/v1/images/search')
                .then(response => response.json()) // 把服务器返回的复杂数据转换成 JSON 格式
                .then(data => {
                    // 3. 从 JSON 数据中精准提取出图片的 URL 网址
                    const catUrl = data[0].url;
                    
                    // 4. 把提取出来的网址塞给网页里的 <img> 标签，然后显示出来
                    document.getElementById('catImage').src = catUrl;
                    
                    // 等图片加载完再显示出来，体验更好
                    document.getElementById('catImage').onload = function() {
                        document.getElementById('loading').style.display = 'none';
                        document.getElementById('catImage').style.display = 'block';
                    }
                })
                .catch(error => {
                    // 5. 如果服务器挂了或者没网，要有错误处理机制
                    alert('哎呀，云端猫咪走丢了，请检查网络重试！');
                    document.getElementById('loading').style.display = 'none';
                });
        }
    </script>

</body>
</html>
