<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>喵星人全能盒子 Pro</title>
    <style>
        :root {
            --cat-primary: #ff9f43;
            --cat-secondary: #ff4757;
            --bg-color: #fef9e7;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 450px; padding: 25px; border-radius: 30px; box-shadow: 0 15px 35px rgba(255, 159, 67, 0.2); text-align: center; }
        
        h1 { color: var(--cat-primary); margin: 0 0 10px 0; }
        .tagline { font-size: 0.9rem; color: #888; margin-bottom: 20px; }

        /* 猫咪展示区 */
        .cat-frame {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #eee;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            border: 3px solid var(--cat-primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #catImg { width: 100%; height: 100%; object-fit: cover; display: none; transition: filter 0.3s ease; }
        #loader { font-size: 0.9rem; color: #999; }

        /* 滤镜控制区 */
        .filter-controls { display: flex; justify-content: center; gap: 8px; margin: 15px 0; flex-wrap: wrap; }
        .filter-btn { padding: 6px 12px; font-size: 0.75rem; border-radius: 20px; border: 1px solid #ddd; background: white; cursor: pointer; }
        .filter-btn.active { background: var(--cat-primary); color: white; border-color: var(--cat-primary); }

        /* 按钮区 */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { padding: 15px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .btn-main { background: var(--cat-primary); color: white; grid-column: span 2; font-size: 1.2rem; margin-bottom: 5px; }
        .btn-sub { background: #333; color: white; font-size: 0.9rem; }
        .btn:active { transform: scale(0.95); }

        .footer { margin-top: 20px; font-size: 0.7rem; color: #ccc; }
    </style>
</head>
<body>

<div class="container">
    <h1>🐱 喵星人 Pro</h1>
    <p class="tagline">看猫、听猫、存猫、分享猫</p>

    <div class="cat-frame">
        <div id="loader">🚀 正在跨次元召唤...</div>
        <img id="catImg" src="" alt="Cat Image">
    </div>

    <div class="filter-controls">
        <button class="filter-btn active" onclick="applyFilter('none', this)">原色</button>
        <button class="filter-btn" onclick="applyFilter('title(1.5) grayscale(1)', this)">经典黑白</button>
        <button class="filter-btn" onclick="applyFilter('sepia(1)', this)">怀旧电影</button>
        <button class="filter-btn" onclick="applyFilter('hue-rotate(180deg)', this)">阿凡达猫</button>
        <button class="filter-btn" onclick="applyFilter('blur(5px)', this)">朦胧美</button>
    </div>

    <div class="action-grid">
        <button class="btn btn-main" onclick="summonCat()">⚡ 召唤下一只</button>
        <button class="btn btn-sub" onclick="playRealMeow()">🔊 听它喵一声</button>
        <button class="btn btn-sub" onclick="downloadImage()">💾 下载美照</button>
        <button class="btn btn-sub" onclick="copyLink()">🔗 复制链接</button>
        <button class="btn btn-sub" onclick="sharePage()">📤 分享好友</button>
    </div>

    <div class="footer">
        Powered by The Cat API & Real Cat Sound
    </div>
</div>

<script>
    let currentUrl = "";

    // 1. 获取随机猫咪图片
    async function summonCat() {
        const img = document.getElementById('catImg');
        const loader = document.getElementById('loader');
        loader.style.display = 'block';
        img.style.display = 'none';
        try {
            const res = await fetch(`https://api.thecatapi.com/v1/images/search?t=${new Date().getTime()}`);
            const data = await res.json();
            currentUrl = data[0].url;
            img.src = currentUrl;
            img.onload = () => {
                loader.style.display = 'none';
                img.style.display = 'block';
            };
        } catch (e) {
            loader.innerText = "召唤失败，请重试";
        }
    }

    // 2. 核心：播放真实的猫叫声 (来自稳定素材库)
    function playRealMeow() {
        // 这是一段非常标准且清脆的猫叫声链接
        const audio = new Audio("https://www.myinstants.com/media/sounds/meow.mp3");
        audio.play().catch(err => {
            alert("由于浏览器限制，请先点击一下页面其他位置再播放声音。");
        });
    }

    // 3. 滤镜功能
    function applyFilter(filterValue, btn) {
        document.getElementById('catImg').style.filter = filterValue;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // 4. 下载图片
    function downloadImage() {
        if(!currentUrl) return;
        const a = document.createElement('a');
        a.href = currentUrl;
        a.download = 'my_cat_' + new Date().getTime() + '.jpg';
        a.target = '_blank'; // 部分浏览器安全性限制，先在新窗口打开
        a.click();
    }

    // 5. 复制链接
    function copyLink() {
        if(!currentUrl) return;
        navigator.clipboard.writeText(currentUrl).then(() => {
            alert("图片地址已复制到剪贴板！");
        });
    }

    // 6. 系统原生分享
    function sharePage() {
        if (navigator.share) {
            navigator.share({ title: '快看这只猫', url: window.location.href });
        } else {
            alert("快快把网址分享给你的朋友吧！");
        }
    }

    window.onload = summonCat;
</script>

</body>
</html>
