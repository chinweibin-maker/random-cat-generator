<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>玄学全能大师 Pro</title>
    <style>
        :root {
            --gold: #f1c40f; --purple: #6c5ce7; --bg: #0f0e17;
            --card: #1b1a23; --text: #a7a9be; --bright: #fffffe; --accent: #e67e22;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .master-container { width: 100%; max-width: 420px; background: var(--card); padding: 25px; border-radius: 30px; border: 1px solid #2d2b38; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; }
        h1 { color: var(--bright); margin: 0; font-size: 1.6rem; }
        .tagline { color: var(--purple); font-size: 0.8rem; margin-bottom: 20px; }
        .input-group { text-align: left; margin-bottom: 12px; }
        label { font-size: 0.7rem; color: var(--purple); font-weight: bold; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #333; border-radius: 10px; color: white; box-sizing: border-box; font-size: 1rem; }
        .btn-calc { width: 100%; padding: 18px; background: linear-gradient(135deg, var(--purple), var(--accent)); color: white; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        #resultView { margin-top: 25px; display: none; text-align: left; }
        .res-card { background: #24222e; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .res-header { font-size: 0.8rem; color: var(--gold); font-weight: bold; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .bazi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
        .pillar { background: #000; padding: 10px 5px; border-radius: 8px; text-align: center; color: var(--gold); font-weight: bold; white-space: pre-line; }
        .stat-row { display: flex; align-items: center; margin: 5px 0; font-size: 0.8rem; }
        .stat-bar { flex: 1; height: 6px; background: #111; border-radius: 3px; margin-left: 10px; overflow: hidden; }
        .stat-fill { height: 100%; background: var(--gold); width: 0; transition: width 1s; }
        #catImg { width: 100%; border-radius: 10px; margin-top: 10px; background: #333; min-height: 150px; }
        .btn-meow { width: 100%; padding: 10px; margin-top: 10px; background: #333; color: var(--accent); border: 1px solid var(--accent); border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="master-container">
    <h1>🔮 玄学全能大师</h1>
    <p class="tagline">Astro, Bazi, Tarot & Luck</p>

    <div class="input-group">
        <label>出生日期</label>
        <input type="date" id="dateIn">
    </div>
    <div class="input-group">
        <label>出生时辰</label>
        <select id="hourIn">
            <option value="0">子时 (23:00-01:00)</option>
            <option value="1">丑时 (01:00-03:00)</option>
            <option value="3">寅时 (03:00-05:00)</option>
            <option value="11">午时 (11:00-13:00)</option>
            </select>
    </div>

    <button class="btn-calc" onclick="mainHandler()">一键看透天机</button>

    <div id="resultView">
        <div class="res-card">
            <div class="res-header">✨ 命盘信息</div>
            <p style="margin:5px 0">生肖：<span id="zRes" style="color:var(--accent)"></span> | 星座：<span id="hRes" style="color:var(--accent)"></span></p>
            <div class="bazi-grid">
                <div class="pillar" id="bz4"></div>
                <div class="pillar" id="bz3"></div>
                <div class="pillar" id="bz2"></div>
                <div class="pillar" id="bz1"></div>
            </div>
        </div>

        <div class="res-card">
            <div class="res-header">🃏 塔罗与灵数</div>
            <p id="tTitle" style="color:var(--bright); font-weight:bold; margin:5px 0;"></p>
            <p id="tDesc" style="font-size:0.8rem; margin:0;"></p>
        </div>

        <div class="res-card">
            <div class="res-header">📅 今日运势与风水</div>
            <div class="stat-row">综合运气 <div class="stat-bar"><div id="bar1" class="stat-fill"></div></div></div>
            <p style="font-size:0.8rem; margin:10px 0 0 0">财位：<span id="f1" style="color:var(--accent)"></span> | 幸运色：<span id="f2" style="color:var(--accent)"></span></p>
        </div>

        <div class="res-card" style="text-align:center">
            <div class="res-header">🐱 守护喵星人</div>
            <img id="catImg" src="">
            <button class="btn-meow" onclick="makeMeow()">🔊 听它喵一声</button>
        </div>
    </div>
</div>

<script>
    // 塔罗列表
    const tarots = [
        {n:"愚者", d:"开启一段全新的旅程，保持好奇心。"},
        {n:"魔术师", d:"你已经准备好了一切资源，大胆行动。"},
        {n:"女祭司", d:"潜意识在指引你，今天适合冥想。"},
        {n:"恋人", d:"关于选择与和谐，人际关系升温。"}
    ];

    function mainHandler() {
        const dStr = document.getElementById('dateIn').value;
        const hour = parseInt(document.getElementById('hourIn').value);
        if(!dStr) return alert("请先选择出生日期");

        const date = new Date(dStr);
        const y = date.getFullYear(), m = date.getMonth()+1, d = date.getDate();

        // 1. 生肖星座 (Python 逻辑)
        const zs = ["猴","鸡","狗","猪","鼠","牛","虎","兔","龙","蛇","马","羊"];
        document.getElementById('zRes').innerText = zs[y % 12];
        document.getElementById('hRes').innerText = "分析中..."; // 此处可按之前逻辑细化

        // 2. 八字
        const G = "甲乙丙丁戊己庚辛壬癸", Z = "子丑寅卯辰巳午未申酉戌亥";
        let nG = G[(y-4)%10], nZ = Z[(y-4)%12];
        document.getElementById('bz1').innerText = nG + "\n" + nZ;
        document.getElementById('bz2').innerText = "月\n柱";
        document.getElementById('bz3').innerText = "日\n柱";
        document.getElementById('bz4').innerText = "时\n柱";

        // 3. 塔罗
        const t = tarots[(y+m+d)%tarots.length];
        document.getElementById('tTitle').innerText = "本命牌：" + t.n;
        document.getElementById('tDesc').innerText = t.d;

        // 4. 风水与运势
        document.getElementById('f1').innerText = ["正东","正南","正西","正北"][d%4];
        document.getElementById('f2').innerText = ["金","木","水","火","土"][m%5] + "色系";
        
        // 显示结果
        document.getElementById('resultView').style.display = 'block';
        setTimeout(() => { document.getElementById('bar1').style.width = "85%"; }, 100);

        // 5. 猫咪图
        document.getElementById('catImg').src = "https://cataas.com/cat?width=400&height=300&rand=" + Math.random();
    }

    function makeMeow() {
        // 使用绝对能响的第三方源
        new Audio("https://www.w3schools.com/tags/horse.ogg").play(); // 替换为猫叫测试
        // 尝试加载一个真实猫叫
        new Audio("https://cdn.freesound.org/previews/256/256334_4486188-lq.mp3").play();
    }
</script>
</body>
</html>
