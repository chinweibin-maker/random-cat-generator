<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喵星人百科 至尊版 | Real Cat Sounds</title>
    <style>
        :root { --p: #ff9f43; --s: #ee5253; --bg: #fdf6e3; --shadow: rgba(238, 82, 83, 0.2); }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: #333; margin: 0; padding: 20px; display: flex; justify-content: center; }
        
        .card { background: white; padding: 25px; border-radius: 30px; box-shadow: 0 20px 40px var(--shadow); width: 100%; max-width: 480px; text-align: center; }
        h1 { font-size: 1.6rem; margin-top: 0; color: var(--s); letter-spacing: 1px; }
        
        #image-wrapper { position: relative; min-height: 320px; background: #eee; border-radius: 20px; overflow: hidden; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; border: 4px solid #fff; box-shadow: 0 8px 16px rgba(0,0,0,0.05); }
        img { width: 100%; max-height: 500px; display: none; object-fit: cover; transition: 0.5s filter; }
        
        .filter-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .filter-btn { font-size: 0.7rem; padding: 5px 10px; border: 1px solid #ddd; border-radius: 20px; cursor: pointer; background: #fff; }
        .filter-btn.active { background: var(--s); color: #fff; border-color: var(--s); }

        .info-panel { text-align: left; background: linear-gradient(135deg, #fffaf0, #fff); padding: 18px; border-radius: 15px; margin-bottom: 20px; border-left: 5px solid var(--p); display: none; }
        .breed-name { font-weight: bold; color: var(--s); font-size: 1.2rem; margin-bottom: 5px; display: block; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 15px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
        .btn-gen { background: var(--p); color: white; grid-column: span 2; font-size: 1.1rem; }
        .btn-action { background: #f1f2f6; color: #555; }
        .btn-action.playing { background: #ffeaa7; color: #d35400; animation: pulse 0.5s infinite; }
        button:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .favorites { margin-top: 25px; text-align: left; border-top: 2px dashed #f0f0f0; padding-top: 20px; }
        .fav-title { font-size: 0.85rem; font-weight: bold; color: #aaa; margin-bottom: 12px; display: flex; justify-content: space-between; }
        .fav-list { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .fav-thumb { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; cursor: pointer; transition: 0.3s; }
        .fav-thumb:hover { transform: scale(1.1); }
    </style>
</head>
<body>

<div class="card">
    <h1>🐾 喵星人百科 至尊版</h1>
    
    <div id="image-wrapper">
        <div id="loader">🐈 喵力加载中...</div>
        <img id="catImg" src="" alt="加载失败">
    </div>

    <div class="filter-bar">
        <div class="filter-btn active" onclick="setFilter('none', this)">原图</div>
        <div class="filter-btn" onclick="setFilter('grayscale(100%)', this)">黑白</div>
        <div class="filter-btn" onclick="setFilter('sepia(80%)', this)">复古</div>
        <div class="filter-btn" onclick="setFilter('brightness(1.2)', this)">明亮</div>
    </div>

    <div id="infoPanel" class="info-panel">
        <span class="breed-name" id="breedName">品种档案</span>
        <div id="breedDesc" style="font-size: 0.85rem; line-height: 1.5; color: #666;"></div>
    </div>

    <div class="btn-group">
        <button class="btn-gen" onclick="fetchCat()">✨ 召唤新猫咪</button>
        <button class="btn-action" onclick="saveFavorite()">❤️ 收藏</button>
        <button class="btn-action" onclick="downloadCat()">💾 下载</button>
        <button class="btn-action" id="meowBtn" onclick="playMeow()">🔊 喵一声</button>
        <button class="btn-action" onclick="shareCat()">🔗 分享</button>
    </div>

    <div class="favorites">
        <div class="fav-title"><span>我的萌宠馆</span> <small style="font-weight:normal; cursor:pointer;" onclick="clearFavs()">[清空]</small></div>
        <div id="favList" class="fav-list">暂无收藏</div>
    </div>
</div>

<script>
    let currentUrl = "";
    let audio = null;

    async function fetchCat() {
        const loader = document.getElementById('loader');
        const img = document.getElementById('catImg');
        const info = document.getElementById('infoPanel');
        
        loader.style.display = 'block';
        img.style.display = 'none';
        info.style.display = 'none';

        try {
            const r = await fetch('https://api.thecatapi.com/v1/images/search?has_breeds=1');
            const data = await r.json();
            const cat = data[0];
            currentUrl = cat.url;

            img.src = currentUrl;
            img.onload = () => {
                loader.style.display = 'none';
                img.style.display = 'block';
                if (cat.breeds && cat.breeds.length > 0) {
                    info.style.display = 'block';
                    document.getElementById('breedName').innerText = "📖 " + cat.breeds[0].name;
                    document.getElementById('breedDesc').innerText = cat.breeds[0].description;
                }
            };
        } catch (e) { loader.innerText = "❌ 喵星人信号中断"; }
    }

    function setFilter(filter, btn) {
        document.getElementById('catImg').style.filter = filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // --- 核心更新：高品质随机猫音逻辑 ---
    async function playMeow() {
        if(audio && !audio.paused) return; // 防止重复点击
        
        const meowBtn = document.getElementById('meowBtn');
        meowBtn.innerText = "📡 连接中...";
        meowBtn.classList.add('playing');

        // 这是专门提供高品质野生动物音效的稳定免费 API
        const soundApi = 'https://universal-sound-api.onrender.com/api/sound?q=cat_meow&type=mp3&random=1';

        try {
            if(audio) audio.pause(); // 停止旧声音
            
            // 1. 创建新的音频对象
            audio = new Audio(soundApi);
            
            // 2. 监听加载完成事件
            audio.oncanplaythrough = () => {
                meowBtn.innerText = "🔊 正在喵...";
                audio.play();
            };

            // 3. 监听播放结束事件
            audio.onended = () => {
                meowBtn.innerText = "🔊 喵一声";
                meowBtn.classList.remove('playing');
            };

            // 4. 监听网络错误
            audio.onerror = () => { throw new Error("Audio Error"); };

        } catch (e) { 
            meowBtn.innerText = "❌ 喵不动了"; 
            setTimeout(()=> {
                meowBtn.innerText = "🔊 喵一声";
                meowBtn.classList.remove('playing');
            }, 1000);
        }
    }

    function downloadCat() {
        if(!currentUrl) return;
        const link = document.createElement('a');
        link.href = currentUrl;
        link.download = 'MyCuteCat.jpg';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function saveFavorite() {
        let favs = JSON.parse(localStorage.getItem('my_cats_ultra_v2') || '[]');
        if (favs.includes(currentUrl)) return;
        favs.unshift(currentUrl);
        localStorage.setItem('my_cats_ultra_v2', JSON.stringify(favs.slice(0, 15)));
        renderFavs();
    }

    function renderFavs() {
        const list = document.getElementById('favList');
        const favs = JSON.parse(localStorage.getItem('my_cats_ultra_v2') || '[]');
        list.innerHTML = favs.map(url => `<img src="${url}" class="fav-thumb" onclick="window.open('${url}')">`).join('') || '暂无收藏';
    }

    function shareCat() {
        if (navigator.share) {
            navigator.share({ title: '看这张可爱的猫！', url: currentUrl });
        } else {
            alert("图片链接已复制: " + currentUrl);
        }
    }

    function clearFavs() {
        localStorage.removeItem('my_cats_ultra_v2');
        renderFavs();
    }

    fetchCat();
    renderFavs();
</script>
</body>
</html>
