<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>喵星人全能盒子 Pro</title>
    <style>
        :root {
            --cat-orange: #ff9f43;
            --cat-pink: #ff9ff3;
            --cat-dark: #2f3542;
            --bg-color: #fef9e7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            color: var(--cat-dark);
            overflow-x: hidden;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 500px;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 159, 67, 0.2);
            text-align: center;
            position: relative;
        }

        h1 { font-size: 1.8rem; color: var(--cat-orange); margin: 0 0 10px 0; }
        .tagline { font-size: 0.9rem; color: #888; margin-bottom: 20px; }

        /* 猫咪展示区 (核心功能) */
        .cat-frame {
            width: 100%;
            aspect-ratio: 4 / 3;
            background: #f1f2f6;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            border: 3px solid var(--cat-orange);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        #catImg {
            max-width: 100%;
            max-height: 100%;
            display: none;
            object-fit: contain;
        }

        #loader { font-size: 0.9rem; color: #999; }

        /* 状态信息区 (功能4 & 100猫音模拟) */
        .status-card {
            background: #fff5f5;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            text-align: left;
            border-left: 5px solid var(--cat-pink);
        }

        .status-item { font-size: 0.9rem; margin: 5px 0; line-height: 1.4; }
        .status-label { font-weight: bold; color: var(--cat-dark); }

        /* 按钮区 */
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }

        .btn-primary { background: var(--cat-orange); color: white; grid-column: span 2; font-size: 1.1rem; padding: 16px;}
        .btn-secondary { background: #f1f2f6; color: var(--cat-dark); }
        .btn:active { transform: scale(0.97); }

        /* 喂食进度条 (功能5) */
        .feed-section { margin: 15px 0; text-align: left; }
        .feed-label { font-size: 0.8rem; font-weight: bold; color: var(--cat-dark); margin-bottom: 5px; display: block;}
        .progress-bar { width: 100%; height: 10px; background: #eee; border-radius: 5px; overflow: hidden; position: relative;}
        .progress-fill { height: 100%; background: var(--cat-pink); width: 0%; transition: width 0.3s ease; }

        /* 喵语翻译器 (功能1) */
        .translate-section { margin-top: 15px; text-align: left; background: #f8f9fa; padding: 15px; border-radius: 15px;}
        .translate-input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px;}
        .translate-res { font-size: 0.9rem; color: var(--cat-orange); font-style: italic; min-height: 20px;}

        /* 点击特效 (功能3) */
        .paw-print {
            position: absolute;
            width: 30px;
            height: 30px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path fill="%23ff9ff3" d="M256 160c-53 0-96 43-96 96s43 96 96 96s96-43 96-96s-43-96-96-96zm160-64c-26.5 0-48 21.5-48 48s21.5 48 48 48s48-21.5 48-48s-21.5-48-48-48zm-320 0c-26.5 0-48 21.5-48 48s21.5 48 48 48s48-21.5 48-48s-21.5-48-48-48zm352 160c-26.5 0-48 21.5-48 48s21.5 48 48 48s48-21.5 48-48s-21.5-48-48-48zM96 256c-26.5 0-48 21.5-48 48s21.5 48 48 48s48-21.5 48-48s-21.5-48-48-48z"/></svg>');
            background-size: cover;
            opacity: 1;
            pointer-events: none;
            animation: pawFadeOut 1s forwards;
            z-index: 100;
        }
        @keyframes pawFadeOut { to { opacity: 0; transform: scale(1.5); } }

        .footer { margin-top: 25px; font-size: 0.7rem; color: #ccc; }

    </style>
</head>
<body onclick="createPawPrint(event)">

<div class="master-container">
    <div class="container">
        <h1>🐱 喵星人全能盒子 Pro</h1>
        <p class="tagline">看猫、听猫、懂猫、爱猫</p>

        <div class="cat-frame">
            <div id="loader">🚀 正在跨次元召唤猫咪...</div>
            <img id="catImg" src="" alt="Cat Image">
        </div>

        <div class="action-grid">
            <button class="btn btn-primary" onclick="summonCat()">⚡ 召唤随机猫咪</button>
            <button class="btn btn-secondary" onclick="playMeow()">🔊 喵一声</button>
            <button class="btn btn-secondary" onclick="downloadImage()">💾 下载美照</button>
            <button class="btn btn-secondary" onclick="copyLink()">🔗 复制链接</button>
            <button class="btn btn-secondary" onclick="sharePage()">📤 分享好友</button>
        </div>

        <div class="feed-section res-card">
            <label class="feed-label">🐟 投喂小鱼干 (增加好感度)</label>
            <div class="progress-bar">
                <div id="feedProgress" class="progress-fill"></div>
            </div>
            <button class="btn btn-secondary" style="width:100%; margin-top:10px; background:var(--cat-pink); color:white;" onclick="feedCat()">递上小鱼干</button>
        </div>

        <div class="status-card">
            <div class="status-item"><span class="status-label">🐈 今日冷知识：</span><span id="catFact">等待召唤...</span></div>
            <div class="status-item"><span class="status-label">💭 品种与分身：</span><span id="catBreed">等待召唤...</span></div>
        </div>

        <div class="translate-section">
            <label class="status-label">🌐 喵语翻译器 (拟声词模拟)</label>
            <input type="text" class="translate-input" id="transInput" placeholder="输入你想对猫咪说的话...">
            <button class="btn btn-secondary" style="width:100%; background:var(--cat-dark); color:white;" onclick="translateToMeow()">翻译成喵语</button>
            <div class="translate-res" id="transResult"></div>
        </div>

        <div class="footer">
            Powered by The Cat API & BIC Meow Engine<br>
            * 特效说明：点击屏幕任意处可留下猫爪印
        </div>
    </div>
</div>

<script>
    // 真实的猫叫声库 (确保多源稳定)
    const MEOW_SOUNDS = [
        "https://cdn.freesound.org/previews/256/256334_4486188-lq.mp3",
        "https://cdn.freesound.org/previews/459/459992_9154694-lq.mp3",
        "https://cdn.freesound.org/previews/415/415209_5121236-lq.mp3"
    ];

    // 功能2/4数据
    const FACTS = [
        "猫的耳朵可以旋转180度。",
        "猫一生中约70%的时间都在睡觉。",
        "猫的胡须和身体一样宽，用来测量空间。",
        "每只猫的鼻纹都是独一无二的。",
        "猫不会觉得甜味。",
        "猫用尾巴来保持平衡。"
    ];
    const BREEDS = [
        "你是：**【大橘】**。状态：大橘为重，只想瘫着。",
        "你是：**【暹罗】**。状态：话痨附体，求抱抱。",
        "你是：**【布偶】**。状态：仙女下凡，静静看着你。",
        "你是：**【狸花】**。状态：大佬气质，正在巡视领地。"
    ];

    let currentUrl = "";
    let feedLevel = 0;

    // 核心功能：召唤猫咪
    async function summonCat() {
        const img = document.getElementById('catImg');
        const loader = document.getElementById('loader');
        loader.style.display = 'block';
        img.style.display = 'none';
        
        try {
            const res = await fetch(`https://api.thecatapi.com/v1/images/search?t=${Date.now()}`);
            const data = await res.json();
            currentUrl = data[0].url;
            img.src = currentUrl;
            img.onload = () => {
                loader.style.display = 'none';
                img.style.display = 'block';
                // 更新BIC功能数据
                document.getElementById('catFact').innerText = FACTS[Math.floor(Math.random() * FACTS.length)];
                document.getElementById('catBreed').innerText = BREEDS[Math.floor(Math.random() * BREEDS.length)];
                resetFeed(); // 换猫时重置喂食
            };
        } catch (e) { loader.innerText = "召唤失败，检查网络后重试"; }
    }

    // 100猫音模拟：点击发声
    function playMeow() {
        const randomSound = MEOW_SOUNDS[Math.floor(Math.random() * MEOW_SOUNDS.length)];
        const audio = new Audio(randomSound);
        audio.play().catch(() => alert("请先点击一下页面其他位置喵~"));
    }

    // 功能1：喵语翻译
    function translateToMeow() {
        const input = document.getElementById('transInput').value;
        const result = document.getElementById('transResult');
        if(!input) { result.innerText = "(静默ing...)"; return; }
        
        let meowStr = "";
        const meows = ["喵", "喵呜", "咪", "嗷", "噜噜"];
        for(let i=0; i<Math.min(input.length, 10); i++) {
            meowStr += meows[Math.floor(Math.random()*meows.length)] + "~ ";
        }
        result.innerText = meowStr + (input.includes("！") ? "！！！" : "");
    }

    // 功能5：喂食
    function feedCat() {
        if(!currentUrl) return;
        feedLevel = Math.min(feedLevel + 25, 100);
        document.getElementById('feedProgress').style.width = feedLevel + "%";
        if(feedLevel >= 100) {
            alert("💖 猫咪对你的好感度爆表了！发出满意的呼噜声~");
            playMeow(); // 满级发声反馈
        }
    }
    function resetFeed() {
        feedLevel = 0;
        document.getElementById('feedProgress').style.width = "0%";
    }

    // 功能3：点击特效
    function createPawPrint(e) {
        // 防止点击按钮时触发特效
        if(e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
        
        const paw = document.createElement('div');
        paw.className = 'paw-print';
        paw.style.left = (e.clientX - 15) + 'px';
        paw.style.top = (e.clientY - 15) + 'px';
        document.body.appendChild(paw);
        setTimeout(() => paw.remove(), 1000);
    }

    // 基础功能
    function downloadImage() { if(currentUrl) window.open(currentUrl, '_blank'); }
    function copyLink() { if(currentUrl) { navigator.clipboard.writeText(currentUrl).then(() => alert("链接已复制")); } }
    function sharePage() { if(navigator.share) { navigator.share({title:'超萌猫咪', url:window.location.href}); } else { alert("请复制地址分享"); } }

    window.onload = summonCat;
</script>

</body>
</html>
