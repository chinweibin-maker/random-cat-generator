<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>喵星人全能助手 Pro</title>
    <style>
        :root {
            --cat-orange: #ff9f43;
            --cat-red: #ff4757;
            --bg-color: #fef9e7;
        }
        body { font-family: sans-serif; background-color: var(--bg-color); text-align: center; padding: 20px; margin: 0; }
        .container { background: white; max-width: 450px; margin: auto; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        h1 { color: var(--cat-orange); margin: 0; font-size: 1.8rem; }
        .tagline { font-size: 0.85rem; color: #888; margin-bottom: 20px; }

        /* 图片显示区 */
        .cat-display { 
            width: 100%; 
            aspect-ratio: 1/1; 
            background: #eee; 
            border-radius: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
            border: 3px solid var(--cat-orange);
            margin-bottom: 15px;
        }
        #catImg { width: 100%; height: 100%; object-fit: cover; display: none; }

        /* 滤镜按钮 */
        .filters { display: flex; justify-content: center; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        .f-btn { font-size: 12px; padding: 6px 12px; border-radius: 20px; border: 1px solid #ddd; background: #fff; cursor: pointer; }
        .f-btn.active { background: var(--cat-orange); color: white; border-color: var(--cat-orange); }

        /* 功能按钮 */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main { background: var(--cat-orange); color: white; grid-column: span 2; font-size: 1.2rem; }
        .btn-sub { background: #333; color: white; font-size: 0.9rem; }
        .btn:active { transform: scale(0.95); }

        #loading { font-weight: bold; color: #999; }
    </style>
</head>
<body>

<div class="container">
    <h1>🐱 喵星人 Pro</h1>
    <p class="tagline">你的专属随机猫咪召唤器</p>

    <div class="cat-display">
        <div id="loading">正在开启传送门...</div>
        <img id="catImg" src="" alt="猫咪">
    </div>

    <div class="filters">
        <button class="f-btn active" onclick="applyF('none', this)">原图</button>
        <button class="f-btn" onclick="applyF('grayscale(1)', this)">黑白</button>
        <button class="f-btn" onclick="applyF('sepia(0.8)', this)">怀旧</button>
        <button class="f-btn" onclick="applyF('invert(1)', this)">反色</button>
    </div>

    <div class="controls">
        <button class="btn btn-main" onclick="getNewCat()">⚡ 召唤下一只</button>
        <button class="btn btn-sub" onclick="doMeow()">🔊 喵一声</button>
        <button class="btn btn-sub" onclick="downloadImg()">💾 下载图片</button>
        <button class="btn btn-sub" onclick="copyLink()">🔗 复制链接</button>
        <button class="btn btn-sub" style="grid-column: span 2; background:#4285F4" onclick="share()">📤 分享给好友</button>
    </div>

    <p style="font-size: 0.7rem; color: #ccc; margin-top: 20px;">Powered by The Cat API</p>
</div>

<script>
    // 使用这个稳定的 MP3 链接，它是真正的猫叫声
    const MEOW_SOUND_URL = "https://www.myinstants.com/media/sounds/meow.mp3";
    const meowAudio = new Audio(MEOW_SOUND_URL);

    // 1. 获取猫咪图片
    async function getNewCat() {
        const img = document.getElementById('catImg');
        const load = document.getElementById('loading');
        load.style.display = 'block';
        img.style.display = 'none';
        
        try {
            const response = await fetch(`https://api.thecatapi.com/v1/images/search?t=${new Date().getTime()}`);
            const data = await response.json();
            img.src = data[0].url;
            img.onload = () => {
                load.style.display = 'none';
                img.style.display = 'block';
            };
        } catch (e) {
            load.innerText = "召唤失败，请检查网络";
        }
    }

    // 2. 滤镜功能
    function applyF(filterValue, btn) {
        document.getElementById('catImg').style.filter = filterValue;
        document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // 3. 真正的“喵”一声
    function doMeow() {
        meowAudio.currentTime = 0; // 重置进度
        meowAudio.play().catch(err => {
            alert("请先点击一下页面，让浏览器允许播放声音");
        });
    }

    // 4. 下载图片
    function downloadImg() {
        const src = document.getElementById('catImg').src;
        if(src) window.open(src, '_blank');
    }

    // 5. 复制链接
    function copyLink() {
        const src = document.getElementById('catImg').src;
        navigator.clipboard.writeText(src).then(() => alert("链接已复制！"));
    }

    // 6. 分享
    function share() {
        if(navigator.share) {
            navigator.share({ title: '看这张可爱的猫！', url: window.location.href });
        } else {
            alert("请手动复制地址分享！");
        }
    }

    // 初始化
    window.onload = getNewCat;
</script>

</body>
</html>
